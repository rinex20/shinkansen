<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>vbulletin-title-div fixture</title>
</head>
<body>
<!--
  對應 v1.4.14 修的「vBulletin 論壇貼文翻譯後 HR 分隔線跑到標題上方」bug。

  結構特徵（sanitized 重現 forum.miata.net 貼文頁的 td.alt1）:
    <td id="target">
      <div class="smallfont"><strong>標題</strong></div>
      <hr>
      <div class="postbitcontrol2">
        內文 …
        <img class="inlineimg">   ← 觸發 containsMedia(TD)=true
      </div>
    </td>

  Bug 根因（v1.4.13 以前的 injectIntoTarget）:
    (1) TD 沒有 BLOCK_TAGS_SET 後代（DIV/HR 都不在），walker 整段 FILTER_ACCEPT → 翻譯單元是 TD
    (2) injectIntoTarget(TD, frag) 判斷 containsMedia(TD)=true（postbitcontrol2 內的 img）
    → 走 media-preserving path，把整個 fragment 塞進「最長文字節點」所在的 postbitcontrol2
    (3) 原本的 smallfont（含空的 STRONG 殼）與 HR 殘留在 postbitcontrol2 上方
    → 視覺上：HR 跑到標題之前，標題 DIV 變空

  v1.4.14 修法（content-inject.js → injectIntoTarget）:
    加結構性條件 hasContainerChild：當 target.children 含 CONTAINER_TAGS 成員（DIV/SECTION/
    ARTICLE/MAIN/ASIDE）時，表示文字分散於不同結構子容器，media-preserving 會注入到錯誤位置。
    改走 clean-slate：清空 TD 所有子節點 → append deserialize 後的 fragment（STRONG → HR → 內文）。
    順序與結構都正確。

  有 img 是觸發 bug 的必要條件；沒有 img 則 containsMedia=false，本來就走 clean-slate（見
  hr-in-td.html fixture 與對應 spec 已涵蓋 v1.4.10 HR 序列化那條更早的 bug）。
-->
<table><tbody><tr>
  <td class="alt1" id="target">
    <div class="smallfont hideonmobile">
      <strong>Thread title goes here for testing purposes only</strong>
    </div>
    <hr class="hideonmobile" size="1">
    <div class="postbitcontrol2" id="post_message_test">
      Good Sunday morning to you all. I posted this in my local forum.
      The power cut out twice during hard acceleration, here is a photo attached:
      <img src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" class="inlineimg" alt="photo">
    </div>
  </td>
</tr></tbody></table>
</body>
</html>
