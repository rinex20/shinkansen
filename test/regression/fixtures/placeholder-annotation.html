<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>fixture: placeholder-annotation</title>
</head>
<body>
  <!--
    對應 v1.4.5 修的「Gemini 在佔位符內插入多餘描述文字」bug。

    Bug 根因（v1.4.4 以前）:
      Gemini 在翻譯 slot 內容涉及醫藥 / 術語時，會在佔位符括號內加注描述，
      例如把 ⟦0⟧ 輸出成 ⟦0 drug⟧，把 ⟦/0⟧ 輸出成 ⟦/0 drug⟧。
      normalizeLlmPlaceholders 只處理前後空白，無法識別「0 drug」型 pattern，
      stripStrayPlaceholderMarkers 把 ⟦ ⟧ 剝掉後，「0 drug」/ 「/0 drug」
      裸字串就殘留在 DOM 裡。

    v1.4.5 修法:
      在 normalizeLlmPlaceholders 加一條 regex，偵測「數字後有空白 + 非空白文字」
      並統一清除，只保留前綴符號與數字：⟦0 drug⟧ → ⟦0⟧、⟦/0 drug⟧ → ⟦/0⟧。

    SANITY 紀錄（已驗證）：移除 v1.4.5 新增 regex 後，DOM textPieces 出現
      "0 drug救急醫護用品.../0 drug\n..." 裸字串，hasDrug 斷言 fail。還原後 pass。
  -->
  <ol>
    <li id="target">
      <strong>ファーストエイド用品（絆創膏、鎮痛剤、布製テーピングなど）</strong><br>
      最低限の怪我や体調不良に対応するための基本装備です。
    </li>
  </ol>
</body>
</html>
