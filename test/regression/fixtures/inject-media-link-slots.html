<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>inject-media-link-slots fixture</title>
</head>
<body>
  <!--
    Fixture: inject-media-link-slots
    結構特徵: <p> 同時含 <img>（emoji）+ 文字 + <a href>（品牌連結）
    對應 v1.2.4 修正的根本原因:
      content.js translateUnits 序列化時遇到 containsMedia(el)=true 強制回傳 slots:[],
      <a> 不被序列化成佔位符, LLM 收到純文字, injection 走 replaceTextInPlace → path B,
      <a> 文字被清空後殼被移除。
    修法: 移除 containsMedia 強制 slots:[] 早返回,讓 <a> 被正常序列化成 ⟦0⟧...⟦/0⟧。
  -->
  <p id="target">
    <img data-emoji="🤏" alt="🤏" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==">Dhruv's been having fun with this little <a href="https://kodak.com/charmera">Kodak Charmera</a> keychain. I want one!!!
  </p>
</body>
</html>
