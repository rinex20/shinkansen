<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>inject-media-link-ghost fixture</title>
  <!-- 結構特徵: p#target 含有「文字 + img + whitespace + <a>」混合結構,
       模擬 Gmail HTML email (如 Raycast newsletter) 的 Team Picks 段落格式。
       containsMedia(p) === true → 走 injectIntoTarget media-preserving path (B)。
       LLM 丟掉佔位符 (response.txt 中無 ⟦…⟧) → ok=false → plainTextFallback。
       v1.2.1 之前的 bug: 清空 <a> 內文字節點後，<a> shell 留在 DOM 形成空連結殼。
       v1.2.2 修法: 清空文字後向上移除空殼 inline 元素。
  -->
</head>
<body>
  <div id="wrapper">
    <p id="target">Get Raycast for Windows
      <img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="arrow" width="8" height="8">
      <a href="https://raycast.com/windows">raycast.com/windows</a>
    </p>
  </div>
</body>
</html>
