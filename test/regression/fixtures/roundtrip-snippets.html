<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>fixture: serialize-deserialize-roundtrip</title>
</head>
<body>
  <!--
    Round-trip 健康檢查:幾個 representative HTML snippet,
    serialize → text + slots → 把 text 直接當「譯文」餵 deserialize →
    比較重建的 fragment 與原 DOM 結構 (tag tree、textContent、href)。

    若 round-trip 失敗,代表 serialize / deserialize 之間有不對稱
    (例如 placeholder 編號漏一個、巢狀拆組錯層、attribute 未保留)。
    這條測試是 catch-all,任何序列化路徑變動都應該保住它。
  -->

  <!-- snippet 1: 簡單純文字 -->
  <p id="s1">This is a simple paragraph with no inline preservables at all.</p>

  <!-- snippet 2: 平鋪 inline (B + A + EM) -->
  <p id="s2">The <b>quick</b> brown <a href="https://example.com/x">fox</a> jumps over the <em>lazy</em> dog.</p>

  <!-- snippet 3: 巢狀 inline (B 包 SMALL 包 A) -->
  <p id="s3">Note: <b>please <small>(<a href="https://example.com/help">read this guide</a>)</small></b> before continuing.</p>

  <!-- snippet 4: 含 atomic sup.reference -->
  <p id="s4">Edo is the old name<sup class="reference"><a href="https://example.com/cite-1">[1]</a></sup> of Tokyo.</p>

  <!-- snippet 5: 含 BR (兩段 / 用 \n round-trip) -->
  <div id="s5">First line of the email body.<br><br>Second line of the email body.</div>
</body>
</html>
