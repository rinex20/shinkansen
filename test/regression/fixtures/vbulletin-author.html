<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>vbulletin-author fixture (v1.4.17)</title>
</head>
<body>
<!--
  對應 v1.4.17 修的「vBulletin 論壇討論串列表翻譯後作者 ID 消失」bug。

  結構特徵（sanitized forumdisplay 列表每列的 thread title cell）:
    <td id="target">
      <div><a id="thread-title" href="..."> 討論串英文標題 </a></div>
      <div class="smallfont">by <span id="author"> 作者ID </span></div>
    </td>

  Bug 根因（v1.4.16 以前的 collectParagraphs）:
    (1) TD 沒有 BLOCK_TAGS_SET 後代（DIV/A/SPAN 都不在），containsBlockDescendant=false
    (2) 整個 TD 被 walker FILTER_ACCEPT → 當成一個翻譯單元
    (3) Gemini 翻譯後只拿回 thread title 的譯文（slot 1 = 作者 SPAN 被 LLM 丟掉）
    (4) injectIntoTarget 走 clean-slate（因為 hasContainerChild=true 的守衛），把整個 TD
        子節點全清空，然後 append 反序列化結果——只有 thread title DIV，
        作者 DIV/SPAN 隨 clean-slate 一起被抹掉 → 作者 ID 消失

  v1.4.17 修法（content-detect.js → collectParagraphs acceptNode）:
    偵測 block element（TD 等 BLOCK_TAGS_SET 成員）是否有 CONTAINER_TAGS（DIV 等）直屬
    子容器，且這些容器內含直屬 <A> 連結。有則改為只把 <A> 捕捉成翻譯單元，TD 本身
    FILTER_SKIP。這樣 TD 的結構（兩個 DIV、作者 SPAN 等）完全不會被 clean-slate 碰到，
    只有 A 的內容會被替換為譯文。

  斷言走結構（不綁 class / site）:
    (1) A#thread-title 被偵測為翻譯單元
    (2) TD#target 不被偵測為 element 單元（核心 regression）
    (3) skipStats.skipBlockWithContainer >= 1（新計數器有被命中）
    (4) skipStats.blockContainerLink >= 1（A 有被捕捉）
-->
<table>
  <tbody>
    <tr>
      <td id="target" class="alt1">
        <div>
          <a id="thread-title" href="/thread/123" title="The thread title">Preparing a track day checklist before the next weekend meet</a>
        </div>
        <div class="smallfont">
          by <span id="author">johndoe_1998</span>
        </div>
      </td>
    </tr>
  </tbody>
</table>
</body>
</html>
